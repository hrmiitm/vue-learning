<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>

    <div id="app">
        {{message}}
        <br>
        {{xyz}} hello
    </div>

</body>
<script>
    const { createApp } = Vue;
    // Look at the object on the right (Vue), find the key named createApp, and assign its value to a new constant named createApp.

    createApp({

        setup() {
            let xyz = 100
            const message = "Hi How are you"
            return {
                message,
                xyz
            }
        }

    }).mount("#app")



</script>
</html>
