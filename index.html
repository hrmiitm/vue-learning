<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>

    <div id="app">
        <p>Lucky Number: {{luckyNumber}}</p>
        {{incrementLuckyNumber()}}
        <hr>
    </div>
    
</body>
<script>

const { createApp, ref, reactive } = Vue;

createApp({

    setup(){

        let luckyNumber = reactive([25]);

        function incrementLuckyNumber(){
            setTimeout(() => {luckyNumber[0] = luckyNumber[0]+1}, 1000);
        }
        

        return {
            luckyNumber,
            incrementLuckyNumber
        }
    }

}).mount("#app")

</script>
</html>
